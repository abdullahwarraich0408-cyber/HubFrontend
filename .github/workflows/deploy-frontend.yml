name: Deploy Frontend to VPS
on:
  push:
    branches:
      - main
    # Only trigger when changes are made inside the Frontend directory or this workflow file itself
    paths:
      - 'Frontend/**'
      - '.github/workflows/deploy-frontend.yml'
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Remove old project from VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            # Delete the existing project directory
            rm -rf ${{ secrets.VPS_PROJECT_PATH }}
            # Create a clean directory
            mkdir -p ${{ secrets.VPS_PROJECT_PATH }}

      - name: Copy project files to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          source: "."
          target: "${{ secrets.VPS_PROJECT_PATH }}"

      - name: Build and Restart on VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            # Navigate to the copied Frontend directory
            cd ${{ secrets.VPS_PROJECT_PATH }}/Frontend
            
            # Install dependencies
            npm install
            
            # Build the Next.js frontend
            npm run build
            
            # Restart the PM2 process (or start if it doesn't exist)
            pm2 describe frontend-app > /dev/null
            if [ $? -eq 0 ]; then
              pm2 restart frontend-app
            else
              pm2 start npm --name "frontend-app" -- run start
            fi
